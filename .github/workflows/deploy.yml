name: Build BJ Electronics

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_ADMIN_EMAIL: ${{ secrets.NEXT_PUBLIC_ADMIN_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Production preflight
        run: npm run preflight

      - name: Validate environment
        run: npm run env:check:strict

      - name: Secret scan
        run: npm run scan:secrets

      - name: Check package lock consistency
        run: npm run lock:check

      - name: CSS audit
        run: npm run audit:css

      - name: Dead import scan
        run: npm run audit:dead

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build static app
        run: npm run build

      - name: Route smoke checks
        run: npm run smoke:routes

      - name: Functional smoke checks
        run: npm run smoke:functional

      - name: Build output audit
        run: npm run audit:build

      - name: Build health report
        run: npm run health:report

      - name: Create Hostinger zip artifact
        run: npm run artifact:zip

      - name: Verify static export
        run: |
          test -f out/index.html
          test -d out/_next
          test -f bjelectronics-hostinger-out.zip
          test -f reports/build-health.md
          echo "Static export verified"

      - name: Upload Hostinger artifact
        uses: actions/upload-artifact@v4
        with:
          name: bjelectronics-hostinger-out
          path: bjelectronics-hostinger-out.zip

      - name: Upload build reports
        uses: actions/upload-artifact@v4
        with:
          name: bjelectronics-build-reports
          path: reports
